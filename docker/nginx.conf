# PingCanvas web tier: serves both apps (index.html editor + kiosk.html) and the
# bind-mounted board/status files under /data. Static only, no server code.
#
# HTTPS is opt-in at RUNTIME, not baked here: if a cert+key are mounted at
# /etc/nginx/certs (compose: ./certs), docker-entrypoint.d/40-pingcanvas-tls.sh
# writes a parallel :443 server that includes the same locations snippet. No
# cert mounted -> this :80 server is all there is (HTTP only). See docker/README.
server {
    listen 80;
    server_name _;
    include /etc/nginx/snippets/pingcanvas-locations.conf;
}
