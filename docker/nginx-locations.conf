# Shared PingCanvas location rules - included in server context by both the :80
# server (nginx.conf) and the optional :443 server that 40-pingcanvas-tls.sh
# generates when a cert is mounted. One source of truth for how boards/status
# and the app assets are served, so HTTP and HTTPS never drift.
root /usr/share/nginx/html;
index index.html;

# /data is the bind-mounted shared working directory, and it legitimately holds
# things that must never be served (a co-located SNMPCanvas database, TLS keys).
# It is ALLOWLISTED: only boards and status JSON come out, every other name
# returns 404 - so a new secret file type can never be served by surprise,
# which an extension denylist could (it ages; this cannot). 404, not 403, so
# existence stays unconfirmed. ^~ pins this prefix ahead of the app-root regex
# locations below; the nested locations then pick the servable shapes.
# Verify: `curl -f http://host:8080/data/certs/server.key` -> 404,
#         `curl -f http://host:8080/data/board.xcanvas`    -> 200.
# Bare /data would otherwise fall through to `location /` and 301-redirect to
# /data/, confirming the directory exists. Same 404 as everything unlisted.
location = /data { return 404; }
location ^~ /data/ {
    # hidden names stay hidden even with an allowlisted extension (.foo.json)
    location ~ /\. { return 404; }
    # boards - .xcanvas served as JSON so the kiosk can fetch + parse
    # (.netdraw = the pre-rename extension, honored forever)
    location ~ \.(xcanvas|netdraw)$ {
        default_type application/json;
        add_header Cache-Control "no-store" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
    # live status feeds - never cached
    location ~ \.json$ {
        add_header Cache-Control "no-store" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
    return 404;
}

# Hidden files and dirs (.env, .git, ...) are never served from the app root
# either.
location ~ /\. {
    return 404;
}

# App-root twins of the board/status rules: deployments that serve a board or
# status.json beside the app (instead of under /data) keep working, with the
# same headers. nginx add_header is NOT inherited into a level that sets its
# own headers, so nosniff must be repeated in each location that adds
# Cache-Control - otherwise exactly the JSON these blocks exist for would ship
# without it.
location ~ \.(xcanvas|netdraw)$ {
    default_type application/json;
    add_header Cache-Control "no-store" always;
    add_header X-Content-Type-Options "nosniff" always;
}
location ~ \.json$ {
    add_header Cache-Control "no-store" always;
    add_header X-Content-Type-Options "nosniff" always;
}
# don't sniff types on anything else we serve (JS/CSS/HTML via location /)
add_header X-Content-Type-Options "nosniff" always;

location / { try_files $uri $uri/ =404; }
